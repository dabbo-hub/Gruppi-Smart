  <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RistoPro Ultimate - FIX Stats & Stampa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-btn { min-height: 150px; transition: all 0.2s; border: 4px solid #e2e8f0; border-radius: 2.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; position: relative; }
        .status-libero { background: white; color: #94a3b8; }
        
        /* Z-INDEX FISSI PER EVITARE SOVRAPPOSIZIONI */
        .modal-bg { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); position: fixed; inset: 0; z-index: 9999; display: none; align-items: center; justify-content: center; }
        #statsMenu { z-index: 10000 !important; }

        .c-blue { background: #3b82f6; color: white; border-color: #1d4ed8; }
        .c-green { background: #10b981; color: white; border-color: #047857; }
        .c-orange { background: #f59e0b; color: white; border-color: #b45309; }
        .c-purple { background: #8b5cf6; color: white; border-color: #6d28d9; }
        .c-red { background: #ef4444; color: white; border-color: #b91c1c; }
        .c-slate { background: #475569; color: white; border-color: #1e293b; }

        @keyframes pulse-checkout {
            0% { border-color: #facc15; box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
            70% { border-color: #fef08a; box-shadow: 0 0 0 15px rgba(250, 204, 21, 0); }
            100% { border-color: #facc15; box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
        }
        .alert-checkout { border: 6px solid #facc15 !important; animation: pulse-checkout 2s infinite; }

        @media print { 
            .no-print { display: none !important; } 
            .print-only { display: block !important; }
            body { background: white; color: black; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th, td { border: 1px solid black; padding: 8px; text-align: left; }
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans overflow-hidden text-slate-800">

    <!-- AREA STAMPA (Nascosta a video) -->
    <div class="print-only hidden p-8 text-black">
        <h1 id="printTitle" class="text-2xl font-bold text-center border-b-2 border-black pb-2 mb-4 uppercase"></h1>
        <div id="printContent"></div>
    </div>

    <!-- SIDEBAR STATISTICHE (CORRETTA) -->
    <div id="statsMenu" class="fixed inset-y-0 right-0 w-96 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 p-6 overflow-y-auto border-l border-slate-200 no-print">
        <div class="flex justify-between items-center mb-6 border-b-2 pb-2">
            <h3 class="text-xl font-black uppercase italic text-blue-600 tracking-tighter">Resoconto Giornaliero</h3>
            <button onclick="toggleStats()" class="text-4xl text-slate-300 hover:text-red-500">&times;</button>
        </div>
        <div id="statsList" class="space-y-4"></div>
    </div>

    <!-- HEADER -->
    <header class="bg-white border-b-4 border-slate-200 p-4 flex justify-between items-center shadow-md z-50 no-print">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black text-slate-800 uppercase italic leading-none">Hotel S.Valentino<br><span class="text-blue-600">Gestione Gruppi 2026</span></h1>
            <div class="flex items-center bg-slate-100 px-4 py-2 rounded-2xl border-2 border-blue-200">
                <input type="date" id="viewDate" onchange="render()" class="bg-transparent font-black text-slate-800 outline-none cursor-pointer">
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="window.print()" class="bg-emerald-600 text-white px-4 py-3 rounded-2xl font-black uppercase text-xs shadow-md">Stampa</button>
            <button onclick="toggleStats()" class="bg-slate-800 text-white px-5 py-3 rounded-2xl font-black uppercase text-xs">Statistiche</button>
            <button onclick="document.getElementById('modalAuto').style.display='flex'" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black uppercase text-xs shadow-xl">+ Gruppo</button>
        </div>
    </header>

    <nav class="bg-white p-3 flex gap-2 border-b z-40 shadow-sm no-print">
        <button onclick="switchSala(1)" id="btn1" class="flex-1 py-4 rounded-xl font-black uppercase transition-all">SALA 1</button>
        <button onclick="switchSala(2)" id="btn2" class="flex-1 py-4 rounded-xl font-black uppercase transition-all">SALA 2</button>
        <button onclick="switchSala(3)" id="btn3" class="flex-1 py-4 rounded-xl font-black uppercase transition-all">SALA 3</button>
    </nav>

    <main id="gridSala" class="flex-1 p-6 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 overflow-y-auto no-print"></main>

    <!-- MODAL TAVOLO -->
    <div id="modalTavolo" class="modal-bg no-print">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-lg p-8 space-y-4">
            <div class="flex justify-between items-center border-b pb-4 text-slate-800">
                <h3 class="text-2xl font-black uppercase italic">Tavolo <span id="mIdDisplay">--</span></h3>
                <button onclick="closeModals()" class="text-4xl text-slate-300">&times;</button>
            </div>
            <input type="text" id="mClient" placeholder="NOME CLIENTE" class="w-full p-4 bg-slate-100 rounded-2xl font-black text-xl uppercase">
            <div class="grid grid-cols-2 gap-4">
                <label class="text-[10px] font-bold">ARRIVO<input type="date" id="mArr" class="w-full p-3 bg-slate-50 border rounded-xl mt-1 font-bold"></label>
                <label class="text-[10px] font-bold text-amber-500 uppercase">Partenza<input type="date" id="mDep" class="w-full p-3 bg-amber-50 border border-amber-200 rounded-xl mt-1 font-bold"></label>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <select id="mColor" class="p-4 bg-slate-100 rounded-2xl font-bold uppercase text-xs">
                    <option value="c-slate">Privato (Grigio)</option><option value="c-blue">Blu</option><option value="c-green">Verde</option>
                    <option value="c-orange">Arancio</option><option value="c-red">Rosso</option>
                </select>
                <label class="flex items-center justify-center gap-2 bg-amber-100 border border-amber-200 rounded-2xl p-4 cursor-pointer">
                    <input type="checkbox" id="mSacco" class="w-5 h-5"> <span class="text-xs font-black text-amber-800 uppercase italic tracking-widest">Cestino</span>
                </label>
            </div>
            <div class="flex gap-2">
                <button onclick="salvaTavolo()" class="flex-1 bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl">SALVA</button>
                <button id="btnLibera" onclick="liberaTavolo()" class="bg-red-100 text-red-600 font-black px-6 rounded-2xl">LIBERA</button>
            </div>
            <div class="pt-4 border-t flex gap-2 items-center">
                <input type="text" id="mRename" class="flex-1 p-3 bg-slate-100 rounded-xl text-xs font-bold uppercase" placeholder="Cambia nome...">
                <button onclick="rinominaTavolo()" class="bg-slate-900 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase">Rinomina</button>
            </div>
        </div>
    </div>

    <!-- MODAL GRUPPO -->
    <div id="modalAuto" class="modal-bg no-print">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-lg p-8 space-y-4">
            <h3 class="text-2xl font-black uppercase text-center border-b pb-4 italic text-slate-800">Allocazione Periodo</h3>
            <input type="text" id="gName" placeholder="NOME GRUPPO" class="w-full p-4 bg-slate-100 rounded-2xl font-black text-xl uppercase text-center">
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="gPax" placeholder="TOT PERSONE" class="p-4 bg-blue-50 border-2 border-blue-200 rounded-2xl font-black text-2xl text-center text-blue-700">
                <select id="gColor" class="p-4 bg-slate-100 rounded-2xl font-bold uppercase text-xs">
                    <option value="c-blue">Colore Blu</option><option value="c-green">Colore Verde</option>
                    <option value="c-orange">Colore Arancio</option><option value="c-purple">Colore Viola</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <label class="text-[10px] font-bold text-slate-400">DATA INIZIO<input type="date" id="gArr" class="w-full p-2 bg-slate-50 border rounded-lg mt-1 font-bold"></label>
                <label class="text-[10px] font-bold text-amber-600 uppercase">Data Partenza<input type="date" id="gDep" class="w-full p-2 bg-amber-50 border border-amber-200 rounded-lg mt-1 font-bold"></label>
            </div>
            <label class="flex items-center gap-3 p-4 bg-amber-100 rounded-2xl border-2 border-amber-200 cursor-pointer">
                <input type="checkbox" id="gSacco" class="w-6 h-6">
                <span class="text-xs font-black text-amber-800 uppercase italic">Cestino alla partenza previsto</span>
            </label>
            <button onclick="autoAllocate()" class="w-full bg-blue-600 text-white font-black py-6 rounded-3xl shadow-xl">OCCUPA PERIODI</button>
            <button onclick="closeModals()" class="w-full text-slate-400 font-bold uppercase text-xs text-center">Chiudi</button>
        </div>
    </div>

    <script>
        let currentSala = 1, activeIdx = null, PAX_PER_TAVOLO = 3;
        const inputDate = document.getElementById('viewDate');
        inputDate.value = new Date().toISOString().split('T')[0];

        let bookings = JSON.parse(localStorage.getItem('risto_ultimate_v12_bookings')) || [];
        let config = JSON.parse(localStorage.getItem('risto_ultimate_v12_names')) || {
            1: Array.from({length: 32}, (_, i) => (i + 1).toString()),
            2: Array.from({length: 28}, (_, i) => (100 + i + 1).toString()),
            3: Array.from({length: 35}, (_, i) => "T" + (i + 1))
        };

        function init() { switchSala(1); }

        function switchSala(num) {
            currentSala = num;
            [1, 2, 3].forEach(n => document.getElementById(`btn${n}`).className = n === num ? "flex-1 py-4 rounded-xl font-black bg-blue-600 text-white shadow-lg" : "flex-1 py-4 rounded-xl font-black bg-slate-200 text-slate-500 shadow-inner");
            render();
        }

        function render() {
            const grid = document.getElementById('gridSala'), date = inputDate.value;
            grid.innerHTML = config[currentSala].map((nome, idx) => {
                const key = `${currentSala}-${idx}`;
                const b = bookings.find(x => x.tables.includes(key) && date >= x.arr && date <= x.dep);
                const colorClass = b ? b.color : 'status-libero';
                const isCheckOutToday = b && b.dep === date;
                
                return `<button onclick="openTavolo('${idx}', '${nome}')" class="table-btn shadow-md ${colorClass} ${isCheckOutToday ? 'alert-checkout' : ''}">
                    <span class="text-[10px] font-black opacity-40 absolute top-4 uppercase italic tracking-tighter">Tavolo ${nome}</span>
                    <span class="text-xl font-black uppercase text-center leading-tight mt-2 px-2">${b ? b.client : 'Libero'}</span>
                    ${b && b.sacco ? `<div class="mt-2 bg-white/20 text-[9px] px-2 py-0.5 rounded-full font-black uppercase italic tracking-widest text-white">🥪 Cestino</div>` : ''}
                    ${isCheckOutToday ? `<span class="mt-1 text-[8px] font-black uppercase bg-yellow-400 text-black px-1 rounded shadow-sm">Partenza!</span>` : ''}
                </button>`;
            }).join('');
            save();
            updateStatsList();
        }

        function toggleStats() {
            const menu = document.getElementById('statsMenu');
            menu.classList.toggle('translate-x-full');
            updateStatsList();
        }

        function updateStatsList() {
            const date = inputDate.value, list = document.getElementById('statsList'), printC = document.getElementById('printContent');
            const attive = bookings.filter(x => date >= x.arr && date <= x.dep);
            
            const html = attive.map(b => {
                const nomiTavoli = b.tables.map(k => {
                    const [s, idx] = k.split('-');
                    return `S${s}-${config[s][idx]}`;
                }).join(', ');
                return `<div class="p-4 rounded-3xl border border-slate-200 bg-slate-50">
                    <p class="font-black text-blue-600 uppercase border-b pb-1 mb-2">${b.client}</p>
                    <div class="flex justify-between text-[11px] font-black uppercase text-slate-500 mb-2">
                        <span>👥 PAX: ${b.tables.length * 3}</span>
                        <span>${b.sacco ? '🥪 CESTINI: SI' : 'NO CESTINO'}</span>
                    </div>
                    <p class="text-[10px] font-bold text-slate-600">${nomiTavoli}</p>
                </div>`;
            }).join('') || '<p class="text-center text-slate-400 py-10 italic">Nessuna presenza.</p>';

            list.innerHTML = html;

            // Prepara area stampa
            document.getElementById('printTitle').innerText = `DATA: ${date}`;
            printC.innerHTML = `<table><tr><th>GRUPPO</th><th>TAVOLI</th><th>PAX</th><th>CESTINO</th></tr>
                ${attive.map(b => `<tr><td>${b.client}</td><td>${b.tables.map(k=>config[k.split('-')[0]][k.split('-')[1]]).join(', ')}</td><td>${b.tables.length*3}</td><td>${b.sacco?'SI':'NO'}</td></tr>`).join('')}</table>`;
        }

        function openTavolo(idx, nome) {
            activeIdx = idx; const date = inputDate.value, key = `${currentSala}-${idx}`;
            const b = bookings.find(x => x.tables.includes(key) && date >= x.arr && date <= x.dep);
            document.getElementById('mIdDisplay').innerText = nome;
            document.getElementById('mRename').value = nome;
            document.getElementById('mClient').value = b ? b.client : "";
            document.getElementById('mArr').value = b ? b.arr : date;
            document.getElementById('mDep').value = b ? b.dep : "";
            document.getElementById('mSacco').checked = b ? b.sacco : false;
            document.getElementById('mColor').value = b ? b.color : 'c-slate';
            document.getElementById('btnLibera').style.display = b ? 'block' : 'none';
            document.getElementById('modalTavolo').style.display = 'flex';
        }

        function salvaTavolo() {
            const key = `${currentSala}-${activeIdx}`, name = document.getElementById('mClient').value.toUpperCase();
            if(!name) return;
            const arr = document.getElementById('mArr').value, dep = document.getElementById('mDep').value;
            bookings = bookings.filter(x => !(x.tables.includes(key) && ((arr >= x.arr && arr <= x.dep) || (dep >= x.arr && dep <= x.dep))));
            bookings.push({ client: name, arr, dep, sacco: document.getElementById('mSacco').checked, color: document.getElementById('mColor').value, tables: [key] });
            closeModals(); render();
        }

        function autoAllocate() {
            const name = document.getElementById('gName').value.toUpperCase(), pax = parseInt(document.getElementById('gPax').value);
            const arr = document.getElementById('gArr').value, dep = document.getElementById('gDep').value;
            if(!name || pax <= 0 || !arr || !dep) return;
            const servono = Math.ceil(pax/3), color = document.getElementById('gColor').value;
            let trovati = [];
            for(let i=0; i<30; i++){
                const key = `${currentSala}-${i}`;
                const occ = bookings.some(b => b.tables.includes(key) && ((arr >= b.arr && arr <= b.dep) || (dep >= b.arr && dep <= b.dep) || (b.arr >= arr && b.arr <= dep)));
                if(!occ){ trovati.push(key); if(trovati.length >= servono) break; }
            }
            if(trovati.length < servono) return alert("Spazio insufficiente!");
            bookings.push({ client: name, arr, dep, sacco: document.getElementById('gSacco').checked, color, tables: trovati });
            closeModals(); render();
        }

        function rinominaTavolo() { config[currentSala][activeIdx] = document.getElementById('mNewName').value.toUpperCase(); localStorage.setItem('risto_ultimate_v12_names', JSON.stringify(config)); render(); }
        function liberaTavolo() { const date = inputDate.value, key = `${currentSala}-${activeIdx}`; bookings = bookings.filter(x => !(x.tables.includes(key) && date >= x.arr && date <= x.dep)); closeModals(); render(); }
        function closeModals() { document.querySelectorAll('.modal-bg').forEach(m => m.style.display = 'none'); }
        function save() { localStorage.setItem('risto_ultimate_v12_bookings', JSON.stringify(bookings)); }
        
        init();
    </script>
</body>
</html>
    
  </body>
  
</html>
