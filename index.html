<!DOCTYPE html>

  <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H
      Ristorante San Valentino - RistoPro FULL FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-btn { min-height: 135px; border: 4px solid #e2e8f0; border-radius: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.5rem; position: relative; cursor: pointer !important; background: white; transition: all 0.2s; }
        .table-btn:hover { border-color: #3b82f6; transform: scale(1.02); }
        .status-libero { color: #cbd5e1; border-style: dashed; }
        .modal-bg { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); position: fixed; inset: 0; z-index: 9999; display: none; align-items: center; justify-content: center; }
        
        .c-blue { background: #3b82f6 !important; color: white !important; border-color: #1d4ed8 !important; }
        .c-green { background: #10b981 !important; color: white !important; border-color: #047857 !important; }
      .c-red { background: #10b981 !important; color: white !important; border-color: #047857 !important; }
        .c-purple { background: #8b5cf6 !important; color: white !important; border-color: #6d28d9 !important; }
        .c-orange { background: #f59e0b !important; color: white !important; border-color: #b45309 !important; }
        .c-slate { background: #475569 !important; color: white !important; border-color: #1e293b !important; }

        @keyframes pulse-red {
            0%, 100% { border-color: #ef4444; }
            50% { border-color: #fca5a5; box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        }
        .alert-partenza-cestino { border: 6px solid #ef4444 !important; animation: pulse-red 1.5s infinite !important; }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; display: block !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans overflow-hidden text-slate-800">

    <!-- HEADER -->
    <header class="bg-white border-b-4 border-blue-800 p-4 h-24 flex justify-between items-center no-print z-50">
        <div class="flex items-center gap-6">
            <h1 class="text-sm font-black uppercase italic text-blue-800 leading-tight">Ristorante <br><span class="text-slate-400 font-bold">S. Valentino</span></h1>
            <input type="date" id="mainDate" onchange="render()" class="bg-slate-50 px-3 py-2 rounded-xl border-2 border-blue-100 font-black text-blue-800 outline-none">
        </div>
        <div class="flex gap-2">
            <button onclick="toggleStats()" class="bg-slate-800 text-white px-5 py-3 rounded-2xl font-black uppercase text-xs">Statistiche</button>
            <button onclick="apriNuovoGruppo()" class="bg-blue-700 text-white px-5 py-3 rounded-2xl font-black uppercase text-xs shadow-lg">+ Nuovo Gruppo</button>
        </div>
    </header>

    <nav class="bg-white p-3 flex gap-2 border-b no-print">
        <button onclick="switchSala(1)" id="btnS1" class="flex-1 py-3 rounded-xl font-black bg-blue-700 text-white uppercase text-xs">Sala 1</button>
        <button onclick="switchSala(2)" id="btnS2" class="flex-1 py-3 rounded-xl font-black bg-slate-100 text-slate-400 uppercase text-xs">Sala 2</button>
        <button onclick="switchSala(3)" id="btnS3" class="flex-1 py-3 rounded-xl font-black bg-slate-100 text-slate-400 uppercase text-xs">Sala 3</button>
    </nav>

    <main id="gridSala" class="flex-1 p-6 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 overflow-y-auto no-print"></main>

    <!-- AREA STAMPA -->
    <div id="printArea" class="hidden"></div>

    <!-- SIDEBAR STATS -->
    <div id="statsMenu" class="fixed inset-y-0 right-0 w-80 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 p-6 overflow-y-auto border-l no-print">
        <div class="flex justify-between items-center mb-6 border-b pb-2 text-blue-800">
            <h3 class="text-lg font-black uppercase">Resoconto</h3>
            <button onclick="toggleStats()" class="text-4xl text-slate-300">×</button>
        </div>
        <div id="statsList" class="space-y-3 mb-6"></div>
        <button onclick="stampaReport()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl uppercase text-xs shadow-lg mb-6">🖨️ Stampa Liste Cestini</button>
        <h4 class="font-black uppercase text-[10px] text-slate-400 mb-2 border-t pt-4">Lista Tavoli</h4>
        <div id="statsTables" class="space-y-1 text-[11px] font-bold"></div>
    </div>

    <!-- MODALE TAVOLO -->
    <div id="modalDetail" class="modal-bg" onclick="if(event.target==this) closeModals()">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm space-y-4 relative shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModals()" class="absolute top-6 right-8 text-3xl text-slate-300">×</button>
            <h3 class="text-xl font-black uppercase text-blue-800 italic">Gestione Tavolo</h3>
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="mNewNum" placeholder="Es: 1 Bis" class="p-3 bg-blue-50 border border-blue-200 rounded-xl font-black uppercase text-blue-800">
                <input type="text" id="mRoom" placeholder="Camera" class="p-3 bg-slate-50 border rounded-xl font-black uppercase">
            </div>
            <input type="text" id="mClient" placeholder="COGNOME OSPITE" class="w-full p-4 bg-slate-100 rounded-xl font-black uppercase outline-none">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="mPax" placeholder="PAX" class="p-3 border rounded-xl font-black text-center text-lg">
                <select id="mPlan" class="p-3 bg-slate-800 text-white rounded-xl font-black text-xs uppercase">
                    <option value="FBB">FBB</option><option value="FB">FB</option>
                    <option value="HB">HB</option><option value="BB">BB</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-2 text-[10px]">
                <div><label class="font-black">DAL</label><input type="date" id="mStart" class="w-full p-2 bg-slate-50 border rounded-lg"></div>
                <div><label class="font-black">AL</label><input type="date" id="mEnd" class="w-full p-2 bg-slate-50 border rounded-lg"></div>
            </div>
            <div class="flex gap-2 justify-center py-1">
                <button onclick="mSelectedCol='c-blue'" class="w-6 h-6 rounded-full bg-blue-500 border-2 border-white"></button>
                <button onclick="mSelectedCol='c-yellow'" class="w-6 h-6 rounded-full bg-yellow-500 border-2 border-white"></button>
                 <button onclick="mSelectedCol='c-green'" class="w-6 h-6 rounded-full bg-emerald-500 border-2 border-white"></button>
                <button onclick="mSelectedCol='c-purple'" class="w-6 h-6 rounded-full bg-purple-500 border-2 border-white"></button>
                              <button onclick="mSelectedCol='c-red'" class="w-6 h-6 rounded-full bg-red-500 border-2 border-white"></button>
                             <button onclick="mSelectedCol='c-pink'" class="w-6 h-6 rounded-full bg-pink-500 border-2 border-white"></button>
              
            </div>
            <label class="flex items-center gap-3 bg-amber-50 p-4 rounded-xl border border-amber-200 cursor-pointer">
                <input type="checkbox" id="mSacco" class="w-6 h-6"> 
                <span class="font-black text-amber-800 uppercase text-xs italic">🥖 Richiesta Cestino </span>
            </label>
            <div class="flex gap-2">
                <button onclick="salvaTavolo()" class="flex-1 bg-blue-700 text-white font-black py-4 rounded-xl uppercase text-xs shadow-md">Salva</button>
                <button onclick="liberaTavolo()" class="bg-red-50 text-red-500 px-4 rounded-xl font-bold">Libera Tavolo</button>
            </div>
        </div>
    </div>

    <!-- MODALE GRUPPO SMART -->
    <div id="modalGroup" class="modal-bg" onclick="if(event.target==this) closeModals()">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-md space-y-4 relative shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModals()" class="absolute top-6 right-8 text-3xl text-slate-300">×</button>
            <h3 class="text-xl font-black uppercase text-blue-800 italic">Assegnazione Tavoli  Gruppo</h3>
            <input type="text" id="gClient" placeholder="NOME GRUPPO / AGENZIA" class="w-full p-4 bg-slate-100 rounded-xl font-black uppercase outline-none">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="gPaxTot" placeholder="PAX TOTALI" class="p-4 border-2 border-blue-100 rounded-xl font-black text-center text-xl text-blue-700">
                <select id="gPlan" class="p-4 bg-slate-800 text-white rounded-xl font-black uppercase">
                    <option value="FBB">FBB</option><option value="FB">FB</option>
                    <option value="HB">HB</option><option value="BB">BB</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-2 text-[10px]">
                <div><label class="font-black uppercase ml-1">Arrivo</label><input type="date" id="gStart" class="w-full p-2 bg-slate-50 border rounded-lg"></div>
                <div><label class="font-black uppercase ml-1">Partenza</label><input type="date" id="gEnd" class="w-full p-2 bg-slate-50 border rounded-lg"></div>
            </div>
            <label class="flex items-center gap-3 bg-amber-50 p-4 rounded-xl border border-amber-200 cursor-pointer">
                <input type="checkbox" id="gSacco" class="w-6 h-6"> 
                <span class="font-black text-amber-800 uppercase text-xs italic">🥖 Cestino per tutti (Partenza)</span>
            </label>
            <button onclick="salvaGruppoSmart()" class="w-full bg-blue-700 text-white font-black py-5 rounded-2xl uppercase shadow-xl">Assegna i Tavoli</button>
        </div>
    </div>

    <script>
        let currentSala = 1;
        let activeId = null;
        let mSelectedCol = 'c-blue';
        let db = JSON.parse(localStorage.getItem('hotelSV_data_final')) || {};

        document.getElementById('mainDate').valueAsDate = new Date();

        function switchSala(n) {
            currentSala = n;
            [1,2,3].forEach(i => {
                const b = document.getElementById('btnS'+i);
                if(b) b.className = (i==n) ? "flex-1 py-3 rounded-xl font-black bg-blue-700 text-white uppercase text-xs" : "flex-1 py-3 rounded-xl font-black bg-slate-100 text-slate-400 uppercase text-xs";
            });
            render();
        }

        function isFree(id, start, end) {
            const data = db[id];
            if (!data) return true;
            return (end < data.start || start > data.end);
        }

        function render() {
            const grid = document.getElementById('gridSala');
            const today = document.getElementById('mainDate').value;
            grid.innerHTML = '';
            
            for(let i=1; i<=32; i++) {
                const id = `S${currentSala}-T${i}`;
                const data = db[id];
                const active = data && today >= data.start && today <= data.end;
                const isCestinoDay = active && data.sacco && today === data.end;

                const btn = document.createElement('div');
                btn.className = `table-btn ${active ? data.color : 'status-libero'} ${isCestinoDay ? 'alert-partenza-cestino' : ''}`;
                btn.onclick = () => openEdit(id, i);
                
                btn.innerHTML = `
                    <span class="absolute top-2 left-3 text-[14px] font-black ${active ? 'opacity-30' : 'opacity-100'}">
                        ${active ? (data.displayNum || 'TAV. '+i) : 'TAVOLO. '+i}
                    </span>
                    ${active ? `
                        <span class="text-xl font-black">${data.room}</span>
                        <span class="text-[10px] font-black uppercase truncate w-full text-center px-1">${data.client}</span>
                        <div class="mt-2 text-[10px] font-black bg-black/10 px-2 py-0.5 rounded-full flex items-center gap-1">
                            👤${data.pax} ${data.plan} ${data.sacco ? '🥖' : ''}
                        </div>
                    ` : '<span class="text-[10px] font-bold mt-4 tracking-widest">LIBERO</span>'}
                `;
                grid.appendChild(btn);
            }
            updateStats();
        }

        function apriNuovoGruppo() {
            document.getElementById('gClient').value = "";
            document.getElementById('gPaxTot').value = "";
            document.getElementById('gStart').value = document.getElementById('mainDate').value;
            document.getElementById('gEnd').value = "";
            document.getElementById('gSacco').checked = false;
            openModal('modalGroup');
        }

        function openEdit(id, num) {
            activeId = id;
            const d = db[id] || {displayNum: 'TAV. '+num, room:'', client:'', pax:2, plan:'FBB', start:document.getElementById('mainDate').value, end:'', sacco:false, color:'c-blue'};
            document.getElementById('mNewNum').value = d.displayNum || "TAV. " + num;
            document.getElementById('mRoom').value = d.room;
            document.getElementById('mClient').value = d.client;
            document.getElementById('mPax').value = d.pax;
            document.getElementById('mPlan').value = d.plan;
            document.getElementById('mStart').value = d.start;
            document.getElementById('mEnd').value = d.end;
            document.getElementById('mSacco').checked = d.sacco;
            mSelectedCol = d.color || 'c-blue';
            openModal('modalDetail');
        }

        function salvaTavolo() {
            db[activeId] = {
                displayNum: document.getElementById('mNewNum').value.toUpperCase(),
                room: document.getElementById('mRoom').value.toUpperCase(),
                client: document.getElementById('mClient').value.toUpperCase(),
                pax: document.getElementById('mPax').value,
                plan: document.getElementById('mPlan').value,
                start: document.getElementById('mStart').value,
                end: document.getElementById('mEnd').value,
                sacco: document.getElementById('mSacco').checked,
                color: mSelectedCol
            };
            save();
        }

        function salvaGruppoSmart() {
            const nome = document.getElementById('gClient').value.toUpperCase();
            const paxTot = parseInt(document.getElementById('gPaxTot').value);
            const start = document.getElementById('gStart').value;
            const end = document.getElementById('gEnd').value;
            const sacco = document.getElementById('gSacco').checked;
            const plan = document.getElementById('gPlan').value;
            const colori = ['c-purple', 'c-green', 'c-orange', 'c-slate'];
            const randomColor = colori[Math.floor(Math.random() * colori.length)];

            if(!nome || !paxTot || !start || !end) return alert("Inserisci tutti i dati!");

            let tavoliLiberi = [];
            for(let i=1; i<=24; i++) {
                const id = `S${currentSala}-T${i}`;
                if(isFree(id, start, end)) tavoliLiberi.push(id);
            }

            const tavoliNecessari = Math.ceil(paxTot / 4);
            if(tavoliLiberi.length < tavoliNecessari) {
                return alert(`Posti insufficienti! Mancano ${tavoliNecessari - tavoliLiberi.length} tavoli liberi.`);
            }

            let paxRimanenti = paxTot;
            for(let i=0; i < tavoliNecessari; i++) {
                const paxTavolo = paxRimanenti >= 4 ? 4 : paxRimanenti;
                db[tavoliLiberi[i]] = { 
                    displayNum: 'TAV. ' + tavoliLiberi[i].split('T')[1], 
                    room: 'GRP', client: nome, pax: paxTavolo, 
                    plan: plan, start, end, sacco, color: randomColor 
                };
                paxRimanenti -= paxTavolo;
            }
            save();
        }

        function updateStats() {
            const today = document.getElementById('mainDate').value;
            const active = Object.values(db).filter(d => today >= d.start && today <= d.end);
            const totalPax = active.reduce((s, x) => s + (parseInt(x.pax)||0), 0);
            const totalBaguette = active.filter(d => d.sacco && today === d.end).reduce((s, x) => s + (parseInt(x.pax)||0), 0);

            document.getElementById('statsList').innerHTML = `
                <div class="p-4 bg-blue-700 text-white rounded-2xl shadow-lg">
                    <p class="text-[10px] font-bold uppercase opacity-70">Coperti Totali</p><p class="text-3xl font-black">${totalPax}</p>
                </div>
                <div class="p-4 bg-amber-400 text-amber-900 rounded-2xl shadow-lg">
                    <p class="text-[10px] font-bold uppercase opacity-70">🥖 Cestini da preparare</p><p class="text-3xl font-black">${totalBaguette}</p>
                </div>
            `;
            let htmlList = "";
            active.forEach(t => {
                htmlList += `<div class="flex justify-between border-b py-1"><span>${t.displayNum} - ${t.client}</span> <span>${t.pax} ${t.plan}</span></div>`;
            });
            document.getElementById('statsTables').innerHTML = htmlList;
        }

        function stampaReport() {
            const today = document.getElementById('mainDate').value;
            const active = Object.values(db).filter(d => today >= d.start && today <= d.end);
            const cestini = active.filter(d => d.sacco && today === d.end);
            const totalBaguette = cestini.reduce((s, x) => s + (parseInt(x.pax)||0), 0);

            let content = `
                <div style="font-family:sans-serif; padding:40px;">
                    <h1 style="text-align:center; border-bottom:4px solid #1e3a8a;">HOTEL SAN VALENTINO - CUCINA ${today}</h1>
                    <div style="display:flex; gap:20px; margin:20px 0;">
                        <div style="flex:1; background:#f1f5f9; padding:20px; border-radius:15px;">
                            <h3>RIEPILOGO PASTI</h3>
                            <p>FBB: ${active.filter(x=>x.plan==='FBB').reduce((s,c)=>s+(parseInt(c.pax)||0),0)} | FB: ${active.filter(x=>x.plan==='FB').reduce((s,c)=>s+(parseInt(c.pax)||0),0)}</p>
                            <p>HB: ${active.filter(x=>x.plan==='HB').reduce((s,c)=>s+(parseInt(c.pax)||0),0)} | BB: ${active.filter(x=>x.plan==='BB').reduce((s,c)=>s+(parseInt(c.pax)||0),0)}</p>
                            <h2 style="border-top:1px solid #000;">TOTALE COPERTI: ${active.reduce((s,x)=>s+(parseInt(x.pax)||0),0)}</h2>
                        </div>
                        <div style="flex:1; background:#fffbeb; padding:20px; border:2px solid #fbbf24; border-radius:15px; text-align:center;">
                            <h3>🥖 CESTINI TOTALI</h3><h1 style="font-size:4rem; margin:0;">${totalBaguette}</h1>
                        </div>
                    </div>
                    <table style="width:100%; border-collapse:collapse;">
                        <tr style="background:#1e3a8a; color:white;"><th style="padding:10px; border:1px solid #ddd;">Tavolo</th><th style="padding:10px; border:1px solid #ddd;">Ospite</th><th style="padding:10px; border:1px solid #ddd; text-align:center;">Q.tà</th></tr>
                        ${cestini.map(c => `<tr><td style="border:1px solid #ddd; padding:10px;">${c.displayNum}</td><td style="border:1px solid #ddd; padding:10px;">${c.client}</td><td style="border:1px solid #ddd; padding:10px; text-align:center; font-weight:bold;">${c.pax}</td></tr>`).join('')}
                    </table>
                </div>`;
            document.getElementById('printArea').innerHTML = content;
            window.print();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-bg').forEach(m => m.style.display = 'none'); }
        function save() { localStorage.setItem('hotelSV_data_final', JSON.stringify(db)); closeModals(); render(); }
        function toggleStats() { document.getElementById('statsMenu').classList.toggle('translate-x-full'); }
        function liberaTavolo() { if(confirm("Cancellare questa prenotazione?")) { delete db[activeId]; save(); } }

        render();
    </script>
</body>
</html>
    
  </body>
  
</html>
